name: Release binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build macOS and Linux binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: |
          bun run build
          bun test

      - name: Compile binaries
        run: |
          mkdir -p dist/release
          bun build --compile --target=bun-darwin-arm64 packages/adapter-pi/src/cli.ts --outfile dist/release/kleptowriter-darwin-arm64
          bun build --compile --target=bun-darwin-x64 packages/adapter-pi/src/cli.ts --outfile dist/release/kleptowriter-darwin-x64
          bun build --compile --target=bun-linux-arm64 packages/adapter-pi/src/cli.ts --outfile dist/release/kleptowriter-linux-arm64
          bun build --compile --target=bun-linux-x64-baseline packages/adapter-pi/src/cli.ts --outfile dist/release/kleptowriter-linux-x64
          (cd dist/release && sha256sum kleptowriter-* > SHA256SUMS)

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: kleptowriter-binaries
          path: dist/release/*

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/release/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/release/* --title "$GITHUB_REF_NAME" --generate-notes
          fi
