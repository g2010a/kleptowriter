name: Release binaries

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run build

  test:
    name: Test (informational, does not block build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  build-linux:
    name: Build Linux binaries
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile binaries
        run: |
          mkdir -p dist/release
          bun build --compile --target=bun-linux-arm64 packages/adapter-tui/src/cli.ts --outfile dist/release/kleptowriter-linux-arm64
          bun build --compile --target=bun-linux-x64-baseline packages/adapter-tui/src/cli.ts --outfile dist/release/kleptowriter-linux-x64
          # Bundle Pi SDK's package.json so the binary can read its own version
          cp packages/adapter-tui/node_modules/@earendil-works/pi-coding-agent/package.json dist/release/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v5
        with:
          name: kleptowriter-linux
          path: dist/release/*

  build-macos:
    name: Build macOS binaries
    runs-on: macos-latest
    needs: typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile and sign binaries
        run: |
          mkdir -p dist/release
          bun build --compile --target=bun-darwin-arm64 packages/adapter-tui/src/cli.ts --outfile dist/release/kleptowriter-darwin-arm64
          bun build --compile --target=bun-darwin-x64 packages/adapter-tui/src/cli.ts --outfile dist/release/kleptowriter-darwin-x64
          # Bundle Pi SDK's package.json so the binary can read its own version
          cp packages/adapter-tui/node_modules/@earendil-works/pi-coding-agent/package.json dist/release/
          codesign --force --sign - dist/release/kleptowriter-darwin-arm64
          codesign --force --sign - dist/release/kleptowriter-darwin-x64
          codesign -dv dist/release/kleptowriter-darwin-arm64
          codesign -dv dist/release/kleptowriter-darwin-x64

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v5
        with:
          name: kleptowriter-macos
          path: dist/release/*

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist/release
          merge-multiple: true

      - name: Generate checksums
        run: |
          chmod +x dist/release/kleptowriter-*
          (cd dist/release && sha256sum kleptowriter-* > SHA256SUMS)

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/release/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/release/* --title "$GITHUB_REF_NAME" --generate-notes
          fi
